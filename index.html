<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Madère · Août 2025</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--ocean:#1b4f72;
--deep:#0e2a38;
--lava:#c0392b;
--sun:#d4a017;
--sand:#f5ede0;
--green:#1e8449;
--white:#fdfaf6;
--text:#1a2a35;
--mid:#5a7a8a
}

body{
font-family:'Lato',sans-serif;
background:var(--deep);
color:var(--white)
}

/* -------- MODAL -------- */

.modal-overlay{
position:fixed;
inset:0;
background:rgba(14,42,56,.97);
z-index:2000;
display:flex;
align-items:center;
justify-content:center;
padding:1.5rem
}
.modal-overlay.hidden{display:none}

.modal-box{
background:rgba(27,79,114,.25);
border:1px solid rgba(255,255,255,.12);
padding:2.5rem;
max-width:420px;
width:100%;
text-align:center;
border-radius:4px
}

.modal-title{
font-family:'Playfair Display',serif;
font-size:2rem;
margin-bottom:.5rem
}
.modal-title em{color:var(--sun)}

.modal-sub{
font-size:.85rem;
color:rgba(255,255,255,.5);
font-weight:300;
margin-bottom:2rem;
line-height:1.7
}

.modal-input{
width:100%;
background:rgba(255,255,255,.07);
border:1px solid rgba(255,255,255,.2);
color:var(--white);
font-family:'Lato',sans-serif;
font-size:1rem;
padding:.9rem 1.2rem;
outline:none;
margin-bottom:1rem;
border-radius:2px
}
.modal-input:focus{border-color:var(--sun)}

.modal-btn{
width:100%;
background:var(--ocean);
color:var(--white);
border:none;
font-size:.85rem;
letter-spacing:.15em;
text-transform:uppercase;
padding:1rem;
cursor:pointer;
border-radius:2px
}

/* -------- HERO -------- */

.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden
}

.hero-img{
position:absolute;
inset:0;
background:url('https://images.unsplash.com/photo-1555881400-74d7acaacd8b?w=1400&q=80') center/cover no-repeat;
filter:brightness(.32)
}

.hero-overlay{
position:absolute;
inset:0;
background:linear-gradient(to bottom,rgba(14,42,56,.05),rgba(14,42,56,.85))
}

.hero-content{position:relative;z-index:2}

.hero-title{
font-family:'Playfair Display',serif;
font-size:clamp(3rem,8vw,6rem)
}

.hero-title em{color:var(--sun)}

/* -------- USER PILL -------- */

.user-pill{
position:fixed;
top:1rem;
right:1rem;
z-index:300;
background:rgba(14,42,56,.92);
border:1px solid rgba(255,255,255,.15);
padding:.4rem 1rem;
border-radius:20px;
font-size:.75rem;
display:flex;
gap:.5rem;
cursor:pointer
}
.user-pill.hidden{display:none}

/* -------- BASIC SECTION -------- */

.loading{
text-align:center;
padding:3rem;
font-size:.8rem;
color:rgba(255,255,255,.35)
}

</style>
</head>

<body>

<!-- MODAL -->
<div class="modal-overlay" id="mo">
  <div class="modal-box">
    <h2 class="modal-title"><em>Madere</em> · Aout 2025</h2>
    <p class="modal-sub">Entrez votre prenom pour continuer</p>

    <input id="pi" class="modal-input" type="text" placeholder="Votre prenom...">

    <button type="button" id="pbtn" class="modal-btn">
      Acceder →
    </button>
  </div>
</div>

<!-- USER -->
<div id="up" class="user-pill hidden">
  <span id="pn"></span>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-img"></div>
  <div class="hero-overlay"></div>
  <div class="hero-content">
    <h1 class="hero-title"><em>Madere</em></h1>
  </div>
</section>

<div id="sg">
  <div class="loading">Chargement...</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* -------- STATE -------- */

let prenom = localStorage.getItem('mp') || null;

/* -------- LOGIN -------- */

function doSetPrenom() {
  const input = document.getElementById('pi');
  const value = input.value.trim();

  if (!value) {
    input.focus();
    return;
  }

  prenom = value;
  localStorage.setItem('mp', value);

  document.getElementById('mo').classList.add('hidden');
  document.getElementById('up').classList.remove('hidden');
  document.getElementById('pn').textContent = value;

  init();
}

/* -------- EVENTS -------- */

document.getElementById('pbtn').addEventListener('click', doSetPrenom);

document.getElementById('pi').addEventListener('keydown', function(e){
  if (e.key === 'Enter') doSetPrenom();
});

/* -------- INIT -------- */

function init(){
  document.getElementById('sg').innerHTML =
    '<div class="loading">Bienvenue ' + prenom + '</div>';
}

/* -------- AUTO LOGIN -------- */

if (prenom) {
  document.getElementById('mo').classList.add('hidden');
  document.getElementById('up').classList.remove('hidden');
  document.getElementById('pn').textContent = prenom;
  init();
}
</script>

</body>
</html>
