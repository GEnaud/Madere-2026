<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madère · Août 2025</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--ocean:#1b4f72;
--deep:#0e2a38;
--lava:#c0392b;
--sun:#d4a017;
--sand:#f5ede0;
--green:#1e8449;
--white:#fdfaf6;
--text:#1a2a35;
--mid:#5a7a8a
}

body{
font-family:'Lato',sans-serif;
background:var(--deep);
color:var(--white)
}

/* ---- FIX PRINCIPAL ICI ---- */

.modal-title{font-family:'Playfair Display',serif}
.modal-title em{color:var(--sun)}

.modal-input{
color:var(--white);
font-family:'Lato',sans-serif
}

.modal-btn{
color:var(--white);
font-family:'Lato',sans-serif
}

/* reste du CSS inchangé */
</style>
</head>

<body>

<div class="modal-overlay" id="mo">
  <div class="modal-box">
    <h2 class="modal-title"><em>Madere</em> · Aout 2025</h2>

    <input id="pi" class="modal-input" type="text" placeholder="Votre prenom...">

    <button type="button" id="pbtn" class="modal-btn">
      Acceder au programme →
    </button>
  </div>
</div>

<div class="user-pill hidden" id="up">
  <span id="pn"></span>
</div>

<section class="hero">
  <h1>Madere</h1>
</section>

<div id="sg">Chargement...</div>

<script>
var prenom = localStorage.getItem('mp') || null;

function doSetPrenom(){
  var v = document.getElementById('pi').value.trim();
  if(!v){return}
  prenom = v;
  localStorage.setItem('mp',v);

  document.getElementById('mo').classList.add('hidden');
  document.getElementById('up').classList.remove('hidden');
  document.getElementById('pn').textContent = v;

  loadAll();
}

document.getElementById('pbtn').addEventListener('click',doSetPrenom);

document.getElementById('pi').addEventListener('keydown',function(e){
  if(e.key==="Enter") doSetPrenom();
});

function loadAll(){
  document.getElementById('sg').innerHTML = "Programme charge pour " + prenom;
}

if(prenom){
  document.getElementById('mo').classList.add('hidden');
  document.getElementById('up').classList.remove('hidden');
  document.getElementById('pn').textContent = prenom;
  loadAll();
}
</script>

</body>
</html>
